# Sportsverse — nginx: PUBLIC website on the apex/www, PRIVATE dashboard on the subdomain.
# Public site has NO auth; dashboard keeps HTTP basic auth (login + Telegram 2FA is a later build).
# Uses the existing Let's Encrypt cert (issued for sportsversenews.com + www + dashboard).
# NOTE: live domain is sportsversenews.com; target sportsversusnews.com needs DNS+cert (see audit).

# HTTP -> HTTPS (and allow ACME renewals)
server {
    listen 80;
    listen [::]:80;
    server_name sportsversenews.com www.sportsversenews.com dashboard.sportsversenews.com
                sportsversusnews.com www.sportsversusnews.com dashboard.sportsversusnews.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# PUBLIC WEBSITE (no auth)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sportsversenews.com www.sportsversenews.com;

    ssl_certificate     /etc/letsencrypt/live/sportsversenews.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sportsversenews.com/privkey.pem;

    root /var/www/sportsverse;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    # /dashboard route -> the private dashboard subdomain
    location = /dashboard  { return 301 https://dashboard.sportsversenews.com/; }
    location = /dashboard/ { return 301 https://dashboard.sportsversenews.com/; }
}

# PRIVATE DASHBOARD (login-gated; basic auth today)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dashboard.sportsversenews.com;

    ssl_certificate     /etc/letsencrypt/live/sportsversenews.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sportsversenews.com/privkey.pem;

    location / {
        auth_basic "Sportsverse - Owner Only";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
