# SportVerse Labs — nginx site config.
# Reverse-proxies the owner dashboard (127.0.0.1:8787) behind HTTP basic auth.
# The owner dashboard is private, so every page requires login. The ACME path is
# exempted so Let's Encrypt (certbot) can issue SSL certificates.
server {
    listen 80;
    listen [::]:80;
    server_name sportsversenews.com www.sportsversenews.com dashboard.sportsversenews.com;

    # Allow Let's Encrypt HTTP-01 challenges without auth.
    location /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/html;
    }

    location / {
        auth_basic "SportVerse Labs - Owner Only";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
